<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>firecrab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #f3f5f7;
      --bg-panel: #ffffff;
      --line: #dde2e8;
      --ink: #171b22;
      --shell: #5b6673;
      --ember: #c43e12;
      --ember-fill: #c43e12;
      --ember-fill-hover: #a8330d;
      --on-ember: #fff7f2;
      --ready: #157f63;
      --error: #b3261e;
      --dim: rgba(91, 102, 115, 0.55);

      --font-display: "Space Mono", ui-monospace, monospace;
      --font-body: "IBM Plex Sans", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: light;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    :focus-visible {
      outline: 2px solid var(--ember);
      outline-offset: 2px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
    }

    .hero {
      position: relative;
      margin-bottom: 3rem;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -4rem;
      left: -6rem;
      width: 22rem;
      height: 22rem;
      background: radial-gradient(circle, rgba(196, 62, 18, 0.09), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      margin: 0 0 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--shell);
    }

    .wordmark {
      position: relative;
      margin: 0 0 1rem;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.4rem, 6vw, 4rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .wordmark .cursor {
      color: var(--ember);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 1.5rem;
    }

    .panel-title {
      margin: 0 0 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--line);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--shell);
    }

    .field-label {
      display: block;
      margin-bottom: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--shell);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.1rem;
      border-bottom: 1px solid var(--line);
      transition: border-color 0.15s ease;
    }

    .input-row:focus-within {
      border-color: var(--ember);
    }

    .prompt {
      font-family: var(--font-mono);
      color: var(--ember);
    }

    #vm-name {
      flex: 1;
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 1rem;
      outline: none;
    }

    #vm-name::placeholder {
      color: var(--dim);
    }

    button {
      font: inherit;
    }

    #launch-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      border: 0;
      border-radius: 3px;
      background: var(--ember-fill);
      color: var(--on-ember);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    #launch-btn:hover:not(:disabled) {
      background: var(--ember-fill-hover);
    }

    #launch-btn:disabled {
      opacity: 0.55;
      cursor: progress;
    }

    .btn-icon {
      color: var(--on-ember);
    }

    .configure-fields {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem 1rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 700px) {
      .configure-fields {
        grid-template-columns: 1.6fr 1.4fr 0.8fr 1fr;
        align-items: end;
      }
    }

    .field-control {
      display: block;
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 0.65rem 0.1rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .field-control:focus {
      border-color: var(--ember);
    }

    select.field-control {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      background-image: linear-gradient(45deg, transparent 50%, var(--shell) 50%), linear-gradient(135deg, var(--shell) 50%, transparent 50%);
      background-position: calc(100% - 12px) center, calc(100% - 7px) center;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .panel-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      margin: 0;
      padding: 0 0 0.75rem;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .panel-toggle .panel-title {
      margin: 0;
      padding: 0;
      border: 0;
    }

    .panel-status {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .panel.is-running .panel-status {
      color: var(--ember);
    }

    .panel.is-ready .panel-status {
      color: var(--ready);
    }

    .panel.is-error .panel-status {
      color: var(--error);
    }

    .chevron {
      font-family: var(--font-mono);
      color: var(--shell);
      transition: transform 0.2s ease;
    }

    .panel.is-open .chevron {
      transform: rotate(90deg);
    }

    .panel-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease;
    }

    .panel.is-open .panel-body {
      grid-template-rows: 1fr;
    }

    .panel-body-inner {
      overflow: hidden;
      min-height: 0;
      padding-top: 1.25rem;
    }

    .console-log {
      margin: 0;
      min-height: 8rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--shell);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .console-json {
      margin: 0;
      min-height: 8rem;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (prefers-reduced-motion: reduce) {
      .panel-body {
        transition: none;
      }
    }

    .console-log .is-ready-line {
      color: var(--ready);
      font-weight: 600;
    }

    .console-log .is-error-line {
      color: var(--error);
      font-weight: 600;
    }

    .cursor {
      display: inline-block;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      to {
        visibility: hidden;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <p class="eyebrow">microVM control plane</p>
      <h1 class="wordmark">FIRECRAB<span class="cursor">_</span></h1>
    </header>

    <main class="stack">
      <section class="panel configure" aria-label="VM 구성">
        <h2 class="panel-title">configure</h2>

        <form id="launch-form">
          <div class="configure-fields">
            <div>
              <label class="field-label" for="vm-name">vm name</label>
              <div class="input-row">
                <span class="prompt">$</span>
                <input
                  id="vm-name"
                  name="name"
                  type="text"
                  placeholder="web-01"
                  autocomplete="off"
                  required
                />
              </div>
            </div>

            <div>
              <label class="field-label" for="vm-template">template</label>
              <select id="vm-template" name="template" class="field-control">
                <option value="ubuntu-rootfs-26.04">ubuntu-rootfs (26.04)</option>
              </select>
            </div>

            <div>
              <label class="field-label" for="vm-cpu">vcpu</label>
              <input
                id="vm-cpu"
                name="cpu"
                class="field-control"
                type="number"
                min="0.5"
                max="4"
                step="0.5"
                value="1"
                required
              />
            </div>

            <div>
              <label class="field-label" for="vm-ram">memory (mib)</label>
              <input
                id="vm-ram"
                name="ram"
                class="field-control"
                type="number"
                min="128"
                max="2048"
                step="128"
                value="512"
                required
              />
            </div>
          </div>

          <button type="submit" id="launch-btn">
            <span class="btn-icon">&#9654;</span>
            <span>launch microvm</span>
          </button>
        </form>
      </section>

      <section class="panel console" id="console-panel" aria-label="부팅 콘솔">
        <button type="button" class="panel-toggle" id="console-toggle" aria-expanded="false" aria-controls="console-body">
          <h2 class="panel-title">console</h2>
          <span class="panel-status" id="console-status">idle</span>
          <span class="chevron" aria-hidden="true">&#9656;</span>
        </button>
        <div class="panel-body" id="console-body">
          <div class="panel-body-inner">
            <pre id="console-log" class="console-log" aria-live="polite">$ waiting for launch<span class="cursor">_</span></pre>
          </div>
        </div>
      </section>

      <section class="panel json" id="json-panel" aria-label="JSON 응답">
        <button type="button" class="panel-toggle" id="json-toggle" aria-expanded="false" aria-controls="json-body">
          <h2 class="panel-title">json</h2>
          <span class="panel-status" id="json-status">idle</span>
          <span class="chevron" aria-hidden="true">&#9656;</span>
        </button>
        <div class="panel-body" id="json-body">
          <div class="panel-body-inner">
            <pre id="console-json" class="console-json" aria-live="polite">—</pre>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = "http://localhost:3000";

    const form = document.getElementById("launch-form");
    const btn = document.getElementById("launch-btn");
    const logEl = document.getElementById("console-log");
    const jsonEl = document.getElementById("console-json");
    const nameInput = document.getElementById("vm-name");
    const templateInput = document.getElementById("vm-template");
    const cpuInput = document.getElementById("vm-cpu");
    const ramInput = document.getElementById("vm-ram");
    const consolePanel = document.getElementById("console-panel");
    const consoleToggle = document.getElementById("console-toggle");
    const consoleStatus = document.getElementById("console-status");
    const jsonPanel = document.getElementById("json-panel");
    const jsonToggle = document.getElementById("json-toggle");
    const jsonStatus = document.getElementById("json-status");

    function openPanel(panel, toggle) {
      panel.classList.add("is-open");
      toggle.setAttribute("aria-expanded", "true");
    }

    function setPanelStatus(panel, statusEl, state, label) {
      panel.classList.remove("is-running", "is-ready", "is-error");
      if (state) panel.classList.add(state);
      statusEl.textContent = label;
    }

    function bindToggle(panel, toggle) {
      toggle.addEventListener("click", () => {
        const isOpen = panel.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", String(isOpen));
      });
    }

    bindToggle(consolePanel, consoleToggle);
    bindToggle(jsonPanel, jsonToggle);

    function resetLog() {
      logEl.textContent = "";
      logEl.classList.remove("is-ready", "is-error");
    }

    function appendLine(text, cls) {
      const node = cls ? document.createElement("span") : document.createTextNode("");
      if (cls) node.className = cls;
      node.textContent = text + "\n";
      logEl.appendChild(node);
    }

    function appendCursor() {
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "_";
      logEl.appendChild(cursor);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      if (!name) return;

      const spec = {
        template: templateInput.value,
        cpu: Number(cpuInput.value),
        ram: Number(ramInput.value),
      };

      const cmd = `$ firecrab launch --name ${name} --template ${spec.template} --cpu ${spec.cpu} --ram ${spec.ram}`;

      btn.disabled = true;
      openPanel(consolePanel, consoleToggle);
      openPanel(jsonPanel, jsonToggle);
      setPanelStatus(consolePanel, consoleStatus, "is-running", "running");
      setPanelStatus(jsonPanel, jsonStatus, "is-running", "running");
      resetLog();
      appendLine(cmd);
      appendLine("  awaiting response");
      appendCursor();
      jsonEl.textContent = "…";

      const start = performance.now();
      try {
        const res = await fetch(`${API_BASE}/api/vms`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, ...spec }),
        });

        if (!res.ok) throw new Error(`http ${res.status}`);

        const data = await res.json();
        const elapsed = Math.round(performance.now() - start);

        resetLog();
        appendLine(cmd);
        appendLine(`  vm "${data.name}"  id=${data.id}`);
        appendLine(`  template=${data.template}  cpu=${data.cpu}  ram=${data.ram}MiB`);
        appendLine(`  state=${data.state}`);
        appendLine("");
        appendLine(`ready in ${elapsed}ms`, "is-ready-line");
        logEl.classList.add("is-ready");
        appendCursor();
        setPanelStatus(consolePanel, consoleStatus, "is-ready", "ready");
        jsonEl.textContent = JSON.stringify(data, null, 2);
        setPanelStatus(jsonPanel, jsonStatus, "is-ready", "ready");
      } catch (err) {
        resetLog();
        appendLine(cmd);
        appendLine("");
        appendLine(`launch failed: ${err.message}`, "is-error-line");
        logEl.classList.add("is-error");
        appendCursor();
        setPanelStatus(consolePanel, consoleStatus, "is-error", "error");
        jsonEl.textContent = JSON.stringify({ error: err.message }, null, 2);
        setPanelStatus(jsonPanel, jsonStatus, "is-error", "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
